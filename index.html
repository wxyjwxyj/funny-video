<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搞笑视频聚合墙</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#e0e0e0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:40px 24px}
h1{font-size:32px;font-weight:700;margin-bottom:8px}
.sub{color:#666;font-size:15px;margin-bottom:48px}
.cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.card{
  background:#1e1e1e;border-radius:16px;padding:32px 40px;
  text-decoration:none;color:inherit;
  transition:transform .15s,background .15s;min-width:200px;
}
.card:hover{transform:translateY(-4px);background:#252525}
.card .icon{font-size:40px;margin-bottom:12px}
.card .label{font-size:17px;font-weight:600;margin-bottom:4px}
.card .desc{font-size:13px;color:#666}
</style>
</head>
<body>
<div class="container">
  <h1>🎬 搞笑视频聚合墙</h1>
  <p class="sub">B站 · 抖音 · 小红书 · 每天自动更新</p>
  <div class="cards">
    <a href="wall.html" class="card">
      <div class="icon">📺</div>
      <div class="label">搞笑视频</div>
      <div class="desc">今天采集的搞笑视频</div>
    </a>
    <a href="ai_wall.html" class="card">
      <div class="icon">🤖</div>
      <div class="label">AI 视频</div>
      <div class="desc">AI资讯、大模型、工具教程</div>
    </a>
    <a href="archive/index.html" class="card">
      <div class="icon">📼</div>
      <div class="label">搞笑归档</div>
      <div class="desc">查看过去每天的视频</div>
    </a>
    <a href="ai_archive/index.html" class="card">
      <div class="icon">📚</div>
      <div class="label">AI 归档</div>
      <div class="desc">过去每天的 AI 内容</div>
    </a>
  </div>
</div>
</body>
</html>
