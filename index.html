<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搞笑视频聚合墙</title>
<style>
:root {
  --bg: #f7f8fc;
  --surface: #ffffff;
  --surface-2: #f3f4f8;
  --border: #e8eaed;
  --text: #1a1a2e;
  --text-sub: #6b7280;
  --text-muted: #9ca3af;
  --accent: #fb7299;
  --accent-dim: rgba(251,114,153,.10);
  --header-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, system-ui, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* ── Hero ── */
.hero {
  text-align: center;
  padding: 72px 24px 48px;
  background: var(--header-grad);
  border-bottom: none;
}
.live-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3);
  border-radius: 20px; padding: 4px 12px 4px 10px;
  font-size: 12px; color: rgba(255,255,255,.9);
  margin-bottom: 22px;
}
.live-dot {
  width: 7px; height: 7px; background: #4ade80;
  border-radius: 50%; flex-shrink: 0;
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
.hero h1 {
  font-size: 38px; font-weight: 800; letter-spacing: -.025em; margin-bottom: 10px;
  line-height: 1.1; color: #fff;
}
.hero h1 .hi { color: #ffd6e7; }
.hero .sub { color: rgba(255,255,255,.8); font-size: 15px; margin-bottom: 28px; line-height: 1.5; }
.platforms { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.platforms span {
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
  border-radius: 8px; padding: 5px 12px;
  font-size: 13px; color: rgba(255,255,255,.9);
}

/* ── Content ── */
main { flex: 1; padding: 40px 24px; max-width: 880px; margin: 0 auto; width: 100%; }

.section + .section { margin-top: 40px; }
.section-label {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .07em;
  margin-bottom: 14px;
}

.nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

.nav-card {
  background: var(--surface);
  border: none;
  box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.05);
  border-radius: 16px; padding: 24px 20px;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: 10px;
  transition: transform .18s cubic-bezier(.34,1.3,.64,1), box-shadow .18s;
}
.nav-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(102,126,234,.18), 0 0 0 1px rgba(102,126,234,.15);
}
.nav-card.primary {
  background: linear-gradient(140deg, #fff 0%, rgba(251,114,153,.06) 100%);
  box-shadow: 0 2px 8px rgba(251,114,153,.15), 0 0 0 1px rgba(251,114,153,.12);
}
.nav-card.primary:hover { box-shadow: 0 8px 24px rgba(251,114,153,.22), 0 0 0 1px rgba(251,114,153,.2); }
.nav-icon { font-size: 28px; line-height: 1; }
.nav-label { font-size: 16px; font-weight: 700; }
.nav-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

/* ── Footer ── */
footer {
  text-align: center; padding: 24px;
  font-size: 12px; color: var(--text-muted);
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<div class="hero">
  <div class="live-badge"><span class="live-dot"></span>每日自动更新</div>
  <h1>🎬 <span class="hi">搞笑</span>视频聚合墙</h1>
  <p class="sub">B站 · 抖音 · 小红书 · 更新于 2026-07-05 11:23:55</p>
  <div class="platforms">
    <span>📺 哔哩哔哩</span>
    <span>🎵 抖音</span>
    <span>📕 小红书</span>
  </div>
</div>
<main>
  <div class="section">
    <div class="section-label">搞笑内容</div>
    <div class="nav-grid">
      <a href="funny_wall.html" class="nav-card primary">
        <div class="nav-icon">📺</div>
        <div class="nav-label">今日搞笑</div>
        <div class="nav-desc">今天采集的搞笑视频</div>
      </a>
      <a href="funny_archive/index.html" class="nav-card">
        <div class="nav-icon">📼</div>
        <div class="nav-label">搞笑归档</div>
        <div class="nav-desc">历史每天的搞笑视频</div>
      </a>
    </div>
  </div>
  <div class="section">
    <div class="section-label">AI 内容</div>
    <div class="nav-grid">
      <a href="ai_wall.html" class="nav-card primary">
        <div class="nav-icon">🤖</div>
        <div class="nav-label">今日 AI</div>
        <div class="nav-desc">AI 资讯、大模型、工具教程</div>
      </a>
      <a href="ai_archive/index.html" class="nav-card">
        <div class="nav-icon">📚</div>
        <div class="nav-label">AI 归档</div>
        <div class="nav-desc">历史每天的 AI 内容</div>
      </a>
    </div>
  </div>
</main>
<footer>个人自用 · 仅聚合展示 · 不分发不二创</footer>
</body>
</html>
