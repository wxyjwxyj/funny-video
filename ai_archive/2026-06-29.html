<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; color: #e0e0e0; font-family: system-ui, sans-serif; }
header { padding: 16px 24px; background: #1a1a1a; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; font-weight: 600; }
header .meta { margin-left: auto; font-size: 13px; color: #888; }
.filters { padding: 12px 24px; background: #161616; display: flex; gap: 8px; flex-wrap: wrap; }
.filters button {
  padding: 4px 12px; border-radius: 20px; border: 1px solid #333;
  background: transparent; color: #aaa; cursor: pointer; font-size: 13px;
}
.filters button.active, .filters button:hover { background: #fb7299; border-color: #fb7299; color: #fff; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  padding: 20px 24px;
}
.card { background: #1e1e1e; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform .15s; }
.card:hover { transform: translateY(-3px); }
.card[data-platform="wechat_video"] { cursor: default; }
.card[data-platform="wechat_video"]::after {
  content: "请在微信中打开"; display: none;
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(7,193,96,.9); color: #fff;
  font-size: 12px; padding: 4px 10px; border-radius: 12px; white-space: nowrap;
}
.card[data-platform="wechat_video"]:hover::after { display: block; }
.card[data-platform="wechat_video"] .thumb { position: relative; }
.thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.score-badge {
  position: absolute; top: 6px; right: 6px;
  background: rgba(0,0,0,.7); color: #fb7299;
  font-size: 12px; font-weight: 700; padding: 2px 7px; border-radius: 12px;
}
.card-body { padding: 10px 12px 12px; }
.title { font-size: 14px; font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.meta { display: flex; gap: 8px; margin-top: 6px; font-size: 12px; color: #666; align-items: center; flex-wrap: wrap; }
.tag { background: #2a2a2a; padding: 2px 8px; border-radius: 10px; color: #aaa; }
.play-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.85); display: flex;
  align-items: center; justify-content: center; z-index: 100;
}
.play-overlay.hidden { display: none; }
.player-wrap { position: relative; width: min(860px, 95vw); aspect-ratio: 16/9; }
.player-wrap iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }
.close-btn {
  position: absolute; top: -36px; right: 0;
  background: none; border: none; color: #fff; font-size: 24px; cursor: pointer;
}
</style>
</head>
<body>

  <button data-platform="bilibili">B站</button><button data-platform="douyin">抖音</button><button data-platform="wechat_video">视频号</button><button data-platform="xiaohongshu">小红书</button>
  
</div>

</div>
<div class="play-overlay hidden" id="overlay">
  <div class="player-wrap">
    <button class="close-btn" id="closeBtn">✕</button>
    <iframe id="player" allowfullscreen></iframe>
  </div>
</div>
<script>
const overlay = document.getElementById('overlay');
const player  = document.getElementById('player');
document.getElementById('closeBtn').onclick = () => {
  overlay.classList.add('hidden');
  player.src = '';
};
overlay.onclick = (e) => { if (e.target === overlay) { overlay.classList.add('hidden'); player.src = ''; } };
// 卡片点击：有 embed → iframe 内嵌；无 embed → 新标签页外跳
document.querySelectorAll('.card').forEach(card => {
  card.onclick = () => {
    const embed = card.dataset.embed;
    if (embed) {
      player.src = embed;
      overlay.classList.remove('hidden');
    } else {
      const href = card.dataset.href;
      if (href) window.open(href, '_blank');
    }
  };
});
// 过滤（评分 + 分区 + 平台）
const cards = [...document.querySelectorAll('.card')];
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const min = parseInt(btn.dataset.min ?? '0');
  const cat = btn.dataset.cat ?? '';
  const platform = btn.dataset.platform ?? '';
  cards.forEach(c => {
    const score = parseInt(c.dataset.score ?? '0');
    const show = (min === 0 || score >= min)
      && (cat === '' || c.dataset.cat === cat)
      && (platform === '' || c.dataset.platform === platform);
    c.style.display = show ? '' : 'none';
  });
});
</script>
</body>
</html>
