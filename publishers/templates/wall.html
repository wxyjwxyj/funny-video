<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{page_title}}</title>
<style>
:root {
  --bg: #f7f8fc;
  --surface: #ffffff;
  --surface-2: #f3f4f8;
  --surface-3: #ebedf2;
  --border: #e8eaed;
  --text: #1a1a2e;
  --text-sub: #6b7280;
  --text-muted: #9ca3af;
  --accent: #fb7299;
  --accent-dim: rgba(251,114,153,.10);
  --bili: #fb7299;
  --douyin: #fe2c55;
  --xhs: #ff2442;
  --radius: 12px;
  --header-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --shadow-card: 0 1px 3px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.05);
  --shadow-hover: 0 8px 24px rgba(251,114,153,.18), 0 0 0 1px rgba(251,114,153,.15);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 40;
  background: var(--header-grad);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: none;
  padding: 0 24px;
  display: flex; align-items: center; gap: 14px; height: 54px;
}
.back-link {
  color: rgba(255,255,255,.75); text-decoration: none;
  font-size: 13px; display: flex; align-items: center; gap: 4px;
  white-space: nowrap; flex-shrink: 0;
}
.back-link:hover { color: #fff; }
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -.01em; white-space: nowrap; color: #fff; }
.header-stats {
  margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
.stat-badge {
  background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.25);
  border-radius: 20px; padding: 3px 10px;
  font-size: 12px; color: rgba(255,255,255,.9);
  font-variant-numeric: tabular-nums; white-space: nowrap;
}
.update-time { font-size: 12px; color: rgba(255,255,255,.65); white-space: nowrap; }

/* ── Filters ── */
.filters {
  position: sticky; top: 54px; z-index: 30;
  background: rgba(247,248,252,.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.filters button {
  padding: 5px 13px; border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-sub);
  cursor: pointer; font-size: 13px; line-height: 1;
  transition: all .15s; white-space: nowrap;
}
.filters button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.filters button.active {
  background: var(--accent); border-color: var(--accent);
  color: #fff; font-weight: 600;
  box-shadow: 0 0 14px rgba(251,114,153,.35);
}
.filters button[data-platform="douyin"].active   { background: var(--douyin); border-color: var(--douyin); box-shadow: 0 0 14px rgba(254,44,85,.35); }
.filters button[data-platform="xiaohongshu"].active { background: var(--xhs); border-color: var(--xhs); box-shadow: 0 0 14px rgba(255,36,66,.35); }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  padding: 20px 24px 56px;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s cubic-bezier(.34,1.3,.64,1), box-shadow .2s;
  box-shadow: var(--shadow-card);
  border: none;
  position: relative;
  display: flex; flex-direction: column;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
}
/* 平台色条 */
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; z-index: 2;
  background: var(--border);
}
.card[data-platform="bilibili"]::before { background: var(--bili); }
.card[data-platform="douyin"]::before   { background: var(--douyin); }
.card[data-platform="xiaohongshu"]::before { background: var(--xhs); }

/* 缩略图 */
.thumb {
  position: relative; width: 100%;
  aspect-ratio: 16/9; background: var(--surface-3);
  overflow: hidden;
}
.thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .35s cubic-bezier(.25,.46,.45,.94);
}
.card:hover .thumb img { transform: scale(1.06); }

/* 左上角平台角标 */
.platform-icon {
  position: absolute; top: 8px; left: 8px; z-index: 3;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(4px);
  border-radius: 6px; padding: 2px 7px;
  font-size: 11px; font-weight: 600; color: var(--text-sub);
}
.card[data-platform="bilibili"] .platform-icon { color: var(--bili); }
.card[data-platform="douyin"] .platform-icon   { color: var(--douyin); }
.card[data-platform="xiaohongshu"] .platform-icon { color: var(--xhs); }

/* 右下角评分徽章 */
.score-badge {
  position: absolute; bottom: 8px; right: 8px; z-index: 3;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(4px);
  border-radius: 8px; padding: 3px 8px;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; gap: 3px;
}
.score-badge.s9 { color: #fbbf24; }
.score-badge.s8 { color: #4ade80; }
.score-badge.s7 { color: var(--text-sub); }

/* 卡片内容 */
.card-body { padding: 12px 13px 13px; flex: 1; display: flex; flex-direction: column; gap: 7px; }
.title {
  font-size: 14px; font-weight: 500; line-height: 1.45; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-muted);
}
.author { color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
.stats { display: flex; gap: 8px; flex-shrink: 0; }
.tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
.tag {
  background: #f0f2f5; border: 1px solid #e8eaed;
  padding: 2px 8px; border-radius: 6px;
  color: var(--text-sub); font-size: 11px;
}

/* ── 空状态 ── */
.empty {
  display: none; grid-column: 1/-1;
  text-align: center; padding: 80px 24px; color: var(--text-muted);
}
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 15px; }

/* ── 播放弹窗 ── */
.play-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  animation: overlay-in .18s ease;
}
.play-overlay.hidden { display: none; }
@keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }

.player-wrap {
  width: min(900px, 94vw);
  animation: player-in .22s cubic-bezier(.34,1.3,.64,1);
}
@keyframes player-in { from { transform: scale(.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.player-aspect { aspect-ratio: 16/9; }
.player-aspect iframe { width: 100%; height: 100%; border: none; border-radius: 10px; box-shadow: 0 24px 80px rgba(0,0,0,.8); }

.player-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 2px 0; gap: 12px;
}
.player-title {
  font-size: 14px; color: rgba(255,255,255,.7);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.close-btn {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,.1); border: none;
  color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.close-btn:hover { background: rgba(255,255,255,.22); }
</style>
</head>
<body>
<header>
  <a href="index.html" class="back-link">← 首页</a>
  <span class="header-title">{{page_title}}</span>
  <div class="header-stats">
    <span class="stat-badge">{{date_label}}</span>
    <span class="stat-badge">{{total}} 条</span>
    <span class="update-time">更新 {{generated_at}}</span>
  </div>
</header>
<div class="filters" id="filters">
  <button class="active" data-min="0">全部</button>
  <button data-min="7">7+ 分</button>
  <button data-min="9">✨ 精选</button>
  <div class="filter-sep"></div>
  {{platform_buttons}}
  <div class="filter-sep"></div>
  {{category_buttons}}
</div>
<div class="grid" id="grid">
  {{cards}}
  <div class="empty" id="empty">
    <div class="icon">🔍</div>
    <p>没有符合条件的视频</p>
  </div>
</div>
<div class="play-overlay hidden" id="overlay">
  <div class="player-wrap">
    <div class="player-aspect">
      <iframe id="player" allowfullscreen></iframe>
    </div>
    <div class="player-bar">
      <span class="player-title" id="playerTitle"></span>
      <button class="close-btn" id="closeBtn" aria-label="关闭">✕</button>
    </div>
  </div>
</div>
<script>
const overlay = document.getElementById('overlay');
const player = document.getElementById('player');
const playerTitle = document.getElementById('playerTitle');

function closePlayer() {
  overlay.classList.add('hidden');
  player.src = '';
  playerTitle.textContent = '';
}

document.getElementById('closeBtn').onclick = closePlayer;
overlay.onclick = e => { if (e.target === overlay) closePlayer(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

// 卡片点击：有 embed → iframe 内嵌；无 embed → 新标签页外跳
document.querySelectorAll('.card').forEach(card => {
  card.onclick = () => {
    const embed = card.dataset.embed;
    if (embed) {
      player.src = embed;
      playerTitle.textContent = card.querySelector('.title')?.textContent || '';
      overlay.classList.remove('hidden');
    } else {
      const href = card.dataset.href;
      if (href) window.open(href, '_blank');
    }
  };
});

// 过滤（评分 + 平台 + 分区）
const cards = [...document.querySelectorAll('.card')];
const emptyEl = document.getElementById('empty');
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const min = parseInt(btn.dataset.min ?? '0');
  const cat = btn.dataset.cat ?? '';
  const platform = btn.dataset.platform ?? '';
  let visible = 0;
  cards.forEach(c => {
    const score = parseInt(c.dataset.score ?? '0');
    const show = (min === 0 || score >= min)
      && (cat === '' || c.dataset.cat === cat)
      && (platform === '' || c.dataset.platform === platform);
    c.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  emptyEl.style.display = visible === 0 ? 'block' : 'none';
});
</script>
</body>
</html>
